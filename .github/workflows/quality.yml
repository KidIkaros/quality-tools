name: Quality Audit

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always
  # Cap parallel rustc jobs to avoid OOM on GitHub Actions runners (7 GB RAM).
  CARGO_BUILD_JOBS: "3"
  RUST_TEST_THREADS: "4"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
      - name: Build all tools (release)
        run: cargo build --release --workspace
      - name: Upload release binaries
        uses: actions/upload-artifact@v4
        with:
          name: quality-bins
          path: |
            target/release/debt
            target/release/doccov
            target/release/crap
            target/release/coupling
            target/release/riskmap
            target/release/dupfind
            target/release/propcov
            target/release/quality
            target/release/mutate
            target/release/fuzz
            target/release/taint
          retention-days: 1

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
      - name: Run unit tests (batched to avoid OOM)
        run: |
          chmod +x ./test.sh
          ./test.sh

  audit:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Run cargo audit
        run: cargo audit --deny warnings
      - name: Download release binaries
        uses: actions/download-artifact@v4
        with:
          name: quality-bins
          path: target/release/
      - name: Mark binaries executable
        run: chmod +x target/release/*
      - name: Add tools to PATH
        run: echo "$(pwd)/target/release" >> $GITHUB_PATH
      - name: Check for technical debt (zero tolerance)
        run: |
          # Check for TODO/FIXME/HACK/XXX markers
          # Exclude test files, debt-scan tool strings, and docs
          echo "Checking for technical debt markers..."
          debt_markers=$(grep -rn "TODO\|FIXME\|HACK\|XXX" --include="*.rs" --include="*.py" --include="*.js" --include="*.ts" . 2>/dev/null | grep -v "tests/" | grep -v "debt-scan/src" | grep -v "docs/" || true)
          if [ -n "$debt_markers" ]; then
            echo "::error::Technical debt markers found (zero tolerance policy):"
            echo "$debt_markers"
            echo ""
            echo "Fix: Remove TODO/FIXME/HACK/XXX markers and track work in issues instead."
            echo "See docs/quality-standards.md for details."
            exit 1
          else
            echo "✓ No technical debt markers found."
          fi

      - name: Run quality self-audit
        run: |
          # Run batch audit; exit 1 if any tool regresses vs baseline
          ./target/release/quality run . --format sarif \
            --baseline .quality-baseline.sarif \
            > quality-results.sarif
          # Check if SARIF indicates new issues (non-zero exit if regression)
          if [ $? -ne 0 ]; then
            echo "::error::Quality regression detected compared to baseline"
            exit 1
          fi
      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: quality-results.sarif
          category: quality-batch
      - name: Post quality comment on PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const sarif = JSON.parse(fs.readFileSync('quality-results.sarif', 'utf8'));
            const results = sarif.runs[0].results || [];
            const tools = {};
            results.forEach(r => {
              const tool = r.ruleId.split('-')[0];
              tools[tool] = (tools[tool] || 0) + 1;
            });
            let body = '## ⚠️ Quality Check Failed\n\n';
            body += 'The following quality issues were found:\n\n';
            for (const [tool, count] of Object.entries(tools)) {
              body += `- **${tool}**: ${count} issue(s)\n`;
            }
            body += '\n### How to Fix\n';
            body += '1. Run `quality run .` locally to see detailed findings\n';
            body += '2. See [docs/quality-standards.md](docs/quality-standards.md) for fix guidance\n';
            body += '3. View the [Security tab](../../security) for detailed SARIF results\n';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
      - name: Update baseline and history on main
        if: github.ref == 'refs/heads/main'
        run: |
          mv quality-results.sarif .quality-baseline.sarif
          # Also record metrics history
          ./target/release/quality history record
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .quality-baseline.sarif .quality-history/ || true
          git commit -m "Update quality baseline and history [ci skip]" || true
          git push origin main || true
    permissions:
      security-events: write
      contents: write
