<svg width="400" height="100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="100" fill="white"/>
  <!-- Code bracket icon -->
  <text x="20" y="65" font-family="monospace" font-size="50" fill="url(#gradient)" font-weight="bold">{ }</text>
  <!-- Text -->
  <text x="90" y="50" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#1e293b">Code</text>
  <text x="90" y="88" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="url(#gradient)">Metrics</text>
</svg>
