<svg width="1280" height="640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg-gradient)"/>
  <!-- Decorative code elements -->
  <text x="50" y="150" font-family="monospace" font-size="28" fill="#475569" opacity="0.6">{ "crap": 15, "risk": "low" }</text>
  <text x="850" y="200" font-family="monospace" font-size="24" fill="#475569" opacity="0.5">fn analyze(path: &Path) -> Result<Report></text>
  <text x="100" y="550" font-family="monospace" font-size="22" fill="#334155" opacity="0.4">$ codemetrics run . --format sarif</text>
  <text x="900" y="580" font-family="monospace" font-size="22" fill="#334155" opacity="0.4"># AI-native code quality</text>
  <!-- Main logo area -->
  <text x="130" y="340" font-family="monospace" font-size="80" fill="url(#text-gradient)" font-weight="bold">{ }</text>
  <text x="300" y="310" font-family="Arial, sans-serif" font-size="90" font-weight="bold" fill="white">Code</text>
  <text x="300" y="410" font-family="Arial, sans-serif" font-size="90" font-weight="bold" fill="url(#text-gradient)">Metrics</text>
  <!-- Tagline -->
  <text x="300" y="480" font-family="Arial, sans-serif" font-size="28" fill="#94a3b8">AI-Native Code Quality Audit Toolkit</text>
  <!-- Tools badge -->
  <rect x="300" y="510" width="180" height="40" rx="20" fill="#0891b2" opacity="0.8"/>
  <text x="390" y="537" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle">10 Tools</text>
</svg>
